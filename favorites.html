<div class="app-container">
  <div class="glass-card">
    <div class="favorites-header">
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> На главную
      </a>

        <i class="fas fa-heart" style="color:#ffecb3;"></i> Избранное
      </h1>
      <div class="sub">Ваши любимые рецепты, сохранённые в браузере</div>
    </div>

    <div class="control-panel">
      <div class="counter-badge">
        <i class="fas fa-heartbeat"></i>
        <span id="favoritesCount">0</span> <span id="favoritesDeclension">рецептов</span>
      </div>
      <button id="clearAllBtn" class="clear-all-btn">
        <i class="fas fa-trash-alt"></i> Очистить всё
      </button>
    </div>

    <div id="recipesGrid" class="recipes-grid"></div>

    <div class="footer-note">
      <span><i class="fas fa-save"></i> Сохраняется в вашем браузере</span>
      <a href="index.html"><i class="fas fa-home"></i> На главную</a>
    </div>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <i class="fas fa-heart-broken"></i>
    <h3>Убрать из избранного?</h3>
    <p id="modalMessage">Вы уверены, что хотите удалить этот рецепт?</p>
    <div class="modal-buttons">
      <button id="modalCancel" class="btn btn-outline">Отмена</button>
      <button id="modalConfirm" class="btn btn-danger"><i class="fas fa-trash-alt"></i> Удалить</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY = 'likedRecipes';

// ─── ЗАГРУЗКА ИЗБРАННОГО ───────────────────────────────────
function loadFavorites() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  } catch (e) {
    console.error('Ошибка загрузки избранного:', e);
    return [];
  }
}

// ─── СОХРАНЕНИЕ ИЗБРАННОГО ─────────────────────────────────
function saveFavorites(favorites) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites));
  updateCounter();
}

// ─── ОБНОВЛЕНИЕ СЧЁТЧИКА И СКЛОНЕНИЕ ───────────────────────
function updateCounter() {
  const favorites = loadFavorites();
  const count = favorites.length;
  const countSpan = document.getElementById('favoritesCount');
  const declensionSpan = document.getElementById('favoritesDeclension');
  
  if (countSpan) countSpan.textContent = count;
  if (declensionSpan) {
    declensionSpan.textContent = getDeclension(count, ['рецепт', 'рецепта', 'рецептов']);
  }
}

// ─── СКЛОНЕНИЕ СЛОВ ────────────────────────────────────────
function getDeclension(number, titles) {
  const cases = [2, 0, 1, 1, 1, 2];
  return titles[(number % 100 > 4 && number % 100 < 20) ? 2 : cases[(number % 10 < 5) ? number % 10 : 5]];
}

// ─── ФОРМАТИРОВАНИЕ ВРЕМЕНИ ────────────────────────────────
function formatTime(time) {
  if (!time) return '';
  const match = String(time).match(/\d+/);
  return match ? match[0] + ' мин' : time;
}

// ─── ПОЛУЧЕНИЕ ПУТИ К ФОТО ─────────────────────────────────
function getPhotoUrl(photo) {
  if (!photo) return null;
  let photoPath = photo.replace(/^\/?pics\//, '');
  return `/pics/${photoPath}`;
}

// ─── ESCAPE HTML ───────────────────────────────────────────
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ─── РЕНДЕР КАРТОЧКИ ───────────────────────────────────────
function renderRecipeCard(recipe, index) {
  const photoUrl = getPhotoUrl(recipe.photo);
  const timeStr = formatTime(recipe.time);
  const caloriesStr = recipe.calories ? `${recipe.calories}` : '';
  const servingsStr = recipe.servings ? `${recipe.servings} порц.` : '';
  const categoryName = recipe.categoryName || recipe.category || 'Рецепт';
  
  // Генерируем уникальный ID для карточки
  const cardId = `recipe_${Date.now()}_${index}`;
  
  return `
    <div class="recipe-card" data-index="${index}" data-recipe-id="${escapeHtml(recipe.id || recipe.title)}">
      <div class="image-wrapper">
        ${photoUrl ? 
          `<img class="recipe-image" src="${photoUrl}" alt="${escapeHtml(recipe.title)}" loading="lazy" 
               onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'no-image\'><i class=\'fas fa-utensils\'></i> 🍳</div>';">` 
          : `<div class="no-image"><i class="fas fa-utensils"></i> 🍳</div>`
        }
      </div>
      <div class="recipe-info">
        <div class="recipe-category">
          <i class="fas fa-tag"></i> ${escapeHtml(categoryName)}
        </div>
        <div class="recipe-title">${escapeHtml(recipe.title)}</div>
        <div class="recipe-meta">
          ${timeStr ? `<span><i class="far fa-clock"></i> ${timeStr}</span>` : ''}
          ${caloriesStr ? `<span><i class="fas fa-fire-flame-curved"></i> ${caloriesStr} ккал</span>` : ''}
          ${servingsStr ? `<span><i class="fas fa-utensils"></i> ${servingsStr}</span>` : ''}
        </div>
        <div class="recipe-actions">
          <button class="btn btn-primary view-btn" data-index="${index}">
            <i class="fas fa-eye"></i> Готовить
          </button>
          <button class="btn btn-danger remove-btn" data-index="${index}">
            <i class="fas fa-trash-can"></i> Убрать
          </button>
        </div>
      </div>
    </div>
  `;
}

// ─── ОТОБРАЖЕНИЕ ВСЕХ ИЗБРАННЫХ ────────────────────────────
function renderFavorites() {
  const favorites = loadFavorites();
  const grid = document.getElementById('recipesGrid');
  
  if (favorites.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="far fa-heart"></i>
        <h3>Ваше избранное ждёт вдохновения ✨</h3>
        <p>Добавляйте рецепты, нажав на ❤️ на главной странице</p>
        <a href="index.html" class="btn btn-primary">
          <i class="fas fa-meteor"></i> Найти рецепты
        </a>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = favorites.map((recipe, i) => renderRecipeCard(recipe, i)).join('');
  
  // Добавляем обработчики на кнопки
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const index = parseInt(btn.dataset.index);
      viewRecipe(favorites[index]);
    });
  });
  
  document.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const index = parseInt(btn.dataset.index);
      showRemoveConfirm(favorites[index], index);
    });
  });
  
  // Добавляем обработчик на всю карточку
  document.querySelectorAll('.recipe-card').forEach((card, i) => {
    card.addEventListener('click', () => {
      viewRecipe(favorites[i]);
    });
  });
}

// ─── ПРОСМОТР РЕЦЕПТА (С СОХРАНЕНИЕМ В sessionStorage) ─────
function viewRecipe(recipe) {
  if (!recipe) return;
  
  // Сохраняем полный рецепт в sessionStorage для восстановления на главной
  sessionStorage.setItem('viewRecipe', JSON.stringify(recipe));
  sessionStorage.setItem('viewRecipeCategory', recipe.category);
  
  // Переходим на главную страницу
  window.location.href = 'index.html';
}

// ─── УДАЛЕНИЕ ОДНОГО РЕЦЕПТА ───────────────────────────────
function removeFromFavorites(index) {
  const favorites = loadFavorites();
  const removed = favorites.splice(index, 1);
  saveFavorites(favorites);
  renderFavorites();
  showToast(`❌ "${removed[0]?.title || 'Рецепт'}" удалён из избранного`, 'error');
}

// ─── ОЧИСТКА ВСЕГО ИЗБРАННОГО ──────────────────────────────
function clearAllFavorites() {
  const favorites = loadFavorites();
  if (favorites.length === 0) {
    showToast('📭 Избранное уже пусто', 'info');
    return;
  }
  
  if (confirm(`Удалить все ${favorites.length} ${getDeclension(favorites.length, ['рецепт', 'рецепта', 'рецептов'])} из избранного?`)) {
    localStorage.removeItem(STORAGE_KEY);
    renderFavorites();
    updateCounter();
    showToast('✅ Всё избранное очищено', 'success');
  }
}

// ─── ПОКАЗ УВЕДОМЛЕНИЯ ТОСТ ────────────────────────────────
function showToast(message, type = '') {
  const toast = document.getElementById('toast');
  const icon = type === 'error' ? 'fa-trash-alt' : (type === 'success' ? 'fa-check-circle' : 'fa-info-circle');
  toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
  toast.className = 'toast show';
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// ─── МОДАЛЬНОЕ ОКНО ────────────────────────────────────────
let currentRemoveIndex = null;

function showRemoveConfirm(recipe, index) {
  const modal = document.getElementById('modal');
  const modalMessage = document.getElementById('modalMessage');
  modalMessage.innerHTML = `Удалить <strong>${escapeHtml(recipe.title)}</strong> из вашего избранного?`;
  currentRemoveIndex = index;
  modal.classList.add('visible');
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.remove('visible');
  currentRemoveIndex = null;
}

function confirmRemove() {
  if (currentRemoveIndex !== null) {
    removeFromFavorites(currentRemoveIndex);
  }
  closeModal();
}

// ─── ИНИЦИАЛИЗАЦИЯ ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Обработчики модалки
  const modalConfirm = document.getElementById('modalConfirm');
  const modalCancel = document.getElementById('modalCancel');
  const modal = document.getElementById('modal');
  
  modalConfirm.addEventListener('click', confirmRemove);
  modalCancel.addEventListener('click', closeModal);
  
  window.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  
  // Обработчик очистки
  const clearBtn = document.getElementById('clearAllBtn');
  clearBtn.addEventListener('click', clearAllFavorites);
  
  // Отображаем избранное
  renderFavorites();
  updateCounter();
  
  // Проверяем, есть ли рецепт для просмотра из sessionStorage
  const viewRecipeData = sessionStorage.getItem('viewRecipe');
  if (viewRecipeData) {
    sessionStorage.removeItem('viewRecipe');
    sessionStorage.removeItem('viewRecipeCategory');
  }
});
</script>
</body>
</html>
