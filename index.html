<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Генератор рецептов</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      min-height: 100vh;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fdf8ed 0%, #fef3e2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .recipe-card {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .header-row {
      display: flex;
      justify-content: flex-end;
      padding: 20px 24px 12px;
    }
    .profile-icon {
      background: #f0e4d4;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #b45f2b;
      cursor: pointer;
      border: 1px solid #ffdec2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .profile-icon:hover { background: #e8d8c4; }

    .nav-bar { padding: 0 24px 12px; }
    
    .random-btn {
      background: linear-gradient(105deg, #f5b042, #f59e0b);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 18px;
      padding: 14px 20px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 14px rgba(245, 158, 11, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .random-btn:active { transform: scale(0.97); }

    .menu-row {
      display: flex;
      gap: 12px;
      margin: 16px 0 12px;
    }

    .menu-link {
      flex: 1;
      background: #fffaf5;
      border: 1.5px solid #ffe3c6;
      border-radius: 50px;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: #c47a2b;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .menu-link:hover { background: #fff0e2; }

    .another-recipe {
      background: linear-gradient(115deg, #2c3e50, #1a2a38);
      border: none;
      border-radius: 56px;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 16px;
      color: white;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      margin: 8px 0 4px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
    }
    .another-recipe.visible { display: flex; }
    .another-recipe:active { transform: scale(0.97); }

    .recipe-container {
      display: none;
    }
    .recipe-container.visible {
      display: block;
    }

    .image-section {
      background: linear-gradient(145deg, #f9efdf, #fae9d4);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    
    .recipe-photo {
      width: 100%;
      height: auto;
      max-height: 260px;
      object-fit: cover;
      display: none;
    }
    
    .food-icon {
      font-size: 64px;
      filter: drop-shadow(2px 6px 12px rgba(0,0,0,0.1));
      padding: 24px;
      text-align: center;
    }
    
    .food-icon.hidden {
      display: none;
    }

    .content { padding: 24px; }

    .category-badge {
      display: inline-block;
      background: #fef1df;
      color: #e67e22;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 30px;
      margin-bottom: 12px;
    }

    .recipe-title {
      font-size: 28px;
      font-weight: 700;
      color: #3e2c1a;
      margin-bottom: 20px;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-badge {
      background: #fef3e8;
      border-radius: 60px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      font-size: 14px;
      color: #7b5a3b;
    }

    .section-title {
      font-weight: 700;
      font-size: 19px;
      margin: 28px 0 16px 0;
      color: #3e2c1c;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #f7b05e;
      padding-left: 14px;
    }

    /* 🔥 ИНГРЕДИЕНТЫ — СПРАВА КОЛИЧЕСТВО, СЛЕВА НАЗВАНИЕ */
    .ingredients-grid {
      background: #fefcf8;
      border-radius: 24px;
      list-style: none;
    }
    .ingredients-grid li {
      padding: 12px 16px;
      border-bottom: 1px solid #f0e6da;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }
    .ingredient-name { 
      font-weight: 500;
      flex: 1;
      color: #2c2418;
    }
    .ingredient-amount {
      color: #b45f2b;
      font-weight: 600;
      background: #fff2e5;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .steps-list li {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: #fefbf7;
      padding: 16px 18px;
      border-radius: 24px;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid #f5e6d8;
      cursor: pointer;
    }
    .steps-list li:hover {
      background: #fffaf2;
      border-color: #faddb4;
      transform: translateX(4px);
    }
    .steps-list li.step-expanded {
      background: linear-gradient(135deg, #fff6ea, #fffaf0);
      border: 2px solid #f5b042;
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(245, 176, 66, 0.25);
      margin: 4px 0;
    }
    .steps-list li.step-expanded .step-text {
      font-weight: 600;
      color: #e67e22;
    }
    .steps-list li.step-expanded .step-number {
      background: #e67e22;
      transform: scale(1.05);
    }
    .step-number {
      background: #f5b042;
      color: white;
      font-weight: 800;
      width: 32px;
      height: 32px;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .step-text { flex: 1; line-height: 1.45; font-size: 15px; color: #3a2e22; }
    .step-icon { font-size: 22px; opacity: 0.6; transition: all 0.2s; }
    .steps-list li.step-expanded .step-icon { opacity: 1; transform: scale(1.1); }

    .note {
      background: #fff7ef;
      border-radius: 24px;
      padding: 16px 20px;
      margin: 28px 0 16px;
      font-size: 14px;
      color: #b76828;
      border-left: 4px solid #f5b042;
      display: flex;
      gap: 12px;
    }

    .like-button {
      background: #ffe8e8;
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-weight: 700;
      font-size: 16px;
      color: #bf3a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 20px;
    }
    .like-button:hover { background: #ffdddd; transform: scale(0.98); }
    hr { margin: 20px 0; border: 1px dashed #f0e0ce; }

    .loader, .error, .warning { display: none; margin: 16px 0; text-align: center; font-size: 14px; }
    .error { color: #dc2626; }
    .warning { color: #d97706; }

    @media (max-width: 500px) {
      .content { padding: 20px; }
      .recipe-title { font-size: 24px; }
      .ingredient-amount { white-space: normal; }
    }
  </style>
</head>
<body>

<div class="recipe-card">
  <div class="header-row">
    <a href="cabinet.html" class="profile-icon">👤 Кабинет</a>
  </div>

  <div class="nav-bar">
    <button class="random-btn" id="randomBtn">🎲 Случайный рецепт</button>
    <div class="menu-row">
      <a href="menu.html" class="menu-link">📅 Меню на неделю</a>
      <a href="ingredients.html" class="menu-link">🔍 По ингредиентам</a>
    </div>
    <button class="another-recipe" id="anotherRecipeBtn">🔄 Другой рецепт</button>
  </div>

  <div class="recipe-container" id="recipeContainer">
    <div class="image-section" id="imageSection">
      <div class="food-icon" id="defaultIcon">🍳✨</div>
      <img class="recipe-photo" id="recipePhoto" alt="Фото блюда">
    </div>

    <div class="content">
      <div class="category-badge" id="categoryBadge"></div>
      <h1 class="recipe-title" id="recipeTitle"></h1>

      <div class="stats-row">
        <div class="stat-badge" id="timeBadge">⏱️ —</div>
        <div class="stat-badge" id="caloriesBadge">🔥 —</div>
      </div>

      <div id="ingredientsContainer"></div>
      <div id="stepsContainer"></div>
      <div id="noteContainer"></div>

      <hr>
      <button class="like-button" id="likeBtn"><span>❤️</span> В избранное</button>
    </div>
  </div>
</div>

<div class="loader" id="loader">Загрузка рецептов...</div>
<div class="error" id="error"></div>
<div class="warning" id="warning"></div>

<script>
// ==================== ГЛОБАЛЬНЫЕ ДАННЫЕ ====================
let allRecipes = {};
let currentCategory = null;
let currentRecipe = null;
let likedRecipes = JSON.parse(localStorage.getItem('likedRecipes') || '[]');

const categoryNames = { 
  breakfast: '🌅 ЗАВТРАК', 
  lunch: '☀️ ОБЕД', 
  dinner: '🌙 УЖИН', 
  soups: '🍲 СУПЫ', 
  dessert: '🍰 ДЕСЕРТЫ' 
};

// ==================== ЗАГРУЗКА ИЗ JSON ====================
async function loadRecipesFromFile() {
  const loader = document.getElementById('loader');
  const errorDiv = document.getElementById('error');
  
  if (loader) loader.style.display = 'block';
  
  try {
    const response = await fetch(`recipes.json?t=${Date.now()}`);
    if (!response.ok) throw new Error(`Файл recipes.json не найден (HTTP ${response.status})`);
    
    const data = await response.json();
    allRecipes = {
      breakfast: data.breakfast || [],
      lunch: data.lunch || [],
      dinner: data.dinner || [],
      soups: data.soups || [],
      dessert: data.dessert || []
    };
    
    const total = Object.values(allRecipes).reduce((s, arr) => s + arr.length, 0);
    if (total === 0) throw new Error('Нет рецептов в файле');
    
    console.log('✅ Загружено рецептов:', total);
    
    await preloadAllImages();
    
    if (loader) loader.style.display = 'none';
    return true;
  } catch (err) {
    if (errorDiv) {
      errorDiv.innerHTML = `❌ ${err.message}<br><small>Проверьте, что recipes.json в той же папке</small>`;
      errorDiv.style.display = 'block';
    }
    if (loader) loader.style.display = 'none';
    return false;
  }
}

async function preloadAllImages() {
  const allUrls = [];
  
  for (const category of Object.keys(allRecipes)) {
    for (const recipe of allRecipes[category]) {
      if (recipe.photo && recipe.photo !== '') {
        allUrls.push(recipe.photo);
      }
    }
  }
  
  if (allUrls.length === 0) return;
  
  const promises = allUrls.map(url => {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve();
      img.onerror = () => resolve();
      img.src = url;
    });
  });
  
  await Promise.all(promises);
}

// 🔥 ФОРМАТИРОВАНИЕ ИНГРЕДИЕНТОВ — СПРАВА КОЛИЧЕСТВО, СЛЕВА НАЗВАНИЕ
function formatIngredients(ingredients) {
  if (!ingredients?.length) return '';
  
  const items = ingredients.map(it => {
    let name, quantity, unit;
    
    if (typeof it === 'string') {
      const match = it.match(/^(\d+(?:\.\d+)?)\s*(.+)$/);
      if (match) {
        quantity = match[1];
        const rest = match[2].trim();
        const unitMatch = rest.match(/^(г|мл|шт|ст\.л|ч\.л|зуб\.|щепотка|банка)\s+(.+)$/);
        if (unitMatch) {
          unit = unitMatch[1];
          name = unitMatch[2];
        } else {
          name = rest;
          unit = getUnitForIngredient(name);
        }
      } else {
        name = it;
        quantity = '';
        unit = getUnitForIngredient(name);
      }
    } else {
      name = it.name || 'Ингредиент';
      quantity = it.quantity ?? '';
      unit = it.unit || getUnitForIngredient(name);
    }
    
    // Очищаем название от лишних пробелов и делаем первый символ заглавным
    const nameFormatted = name.trim().charAt(0).toUpperCase() + name.trim().slice(1);
    
    // Формируем количество с единицей измерения
    let amountText = '';
    if (quantity && unit) {
      amountText = `${quantity} ${unit}`;
    } else if (quantity) {
      amountText = quantity;
    } else if (unit) {
      amountText = unit;
    } else {
      amountText = 'по вкусу';
    }
    
    return `<li><span class="ingredient-name">${nameFormatted}</span><span class="ingredient-amount">${amountText}</span></li>`;
  });
  
  return `<div class="section-title"><span>📋</span> Ингредиенты</div><ul class="ingredients-grid">${items.join('')}</ul>`;
}

function getUnitForIngredient(name) {
  const lower = name.toLowerCase();
  if (lower.includes('яйцо') || lower.includes('банан') || lower.includes('помидор') || 
      lower.includes('лук') || lower.includes('морков') || lower.includes('картош') ||
      lower.includes('кабачок') || lower.includes('баклажан')) return 'шт';
  if (lower.includes('зубчик')) return 'зуб.';
  if (lower.includes('щепотк')) return 'щепотка';
  if (lower.includes('столовая') || lower.includes('ст.л')) return 'ст.л.';
  if (lower.includes('чайная') || lower.includes('ч.л')) return 'ч.л.';
  if (lower.includes('банка')) return 'банка';
  return 'г';
}

function formatSteps(steps) {
  if (!steps?.length) return '';
  
  const stepIcons = ['🍯', '✨', '🥣', '🍪', '📄', '🔥', '🍵', '🧂', '🍽️', '⭐'];
  
  const items = steps.map((step, idx) => `
    <li data-step="${idx + 1}">
      <span class="step-number">${idx + 1}</span>
      <span class="step-text">${step}</span>
      <span class="step-icon">${stepIcons[idx % stepIcons.length]}</span>
    </li>
  `).join('');
  
  return `<div class="section-title"><span>👩‍🍳</span> Приготовление</div><ul class="steps-list" id="stepsList">${items}</ul>`;
}

// ==================== ОТОБРАЖЕНИЕ РЕЦЕПТА ====================
function displayRecipe(recipe, category) {
  if (!recipe) return;
  
  const container = document.getElementById('recipeContainer');
  container.classList.add('visible');
  
  const anotherBtn = document.getElementById('anotherRecipeBtn');
  anotherBtn.classList.add('visible');
  
  document.getElementById('categoryBadge').textContent = categoryNames[category] || category.toUpperCase();
  document.getElementById('recipeTitle').textContent = recipe.title;
  document.getElementById('timeBadge').innerHTML = recipe.time ? `⏱️ ${recipe.time}` : '⏱️ —';
  document.getElementById('caloriesBadge').innerHTML = recipe.calories ? `🔥 ${recipe.calories} ккал` : '🔥 —';
  
  const photoEl = document.getElementById('recipePhoto');
  const defaultIcon = document.getElementById('defaultIcon');
  
  if (recipe.photo && recipe.photo !== '') {
    photoEl.src = recipe.photo;
    photoEl.style.display = 'block';
    defaultIcon.classList.add('hidden');
  } else {
    photoEl.style.display = 'none';
    defaultIcon.classList.remove('hidden');
  }
  
  document.getElementById('ingredientsContainer').innerHTML = formatIngredients(recipe.ingredients);
  document.getElementById('stepsContainer').innerHTML = formatSteps(recipe.steps);
  
  if (recipe.note) {
    document.getElementById('noteContainer').innerHTML = `<div class="note"><span>✨</span> ${recipe.note}</div>`;
  } else {
    document.getElementById('noteContainer').innerHTML = '';
  }
  
  updateLikeButton(recipe, category);
  attachStepHandlers();
}

function attachStepHandlers() {
  const stepsList = document.getElementById('stepsList');
  if (!stepsList) return;
  
  const newStepsList = stepsList.cloneNode(true);
  stepsList.parentNode.replaceChild(newStepsList, stepsList);
  
  newStepsList.addEventListener('click', (event) => {
    const stepItem = event.target.closest('li');
    if (!stepItem) return;
    
    const isExpanded = stepItem.classList.contains('step-expanded');
    
    document.querySelectorAll('.steps-list li').forEach(li => {
      li.classList.remove('step-expanded');
    });
    
    if (!isExpanded) {
      stepItem.classList.add('step-expanded');
      setTimeout(() => {
        if (stepItem.classList.contains('step-expanded')) {
          stepItem.classList.remove('step-expanded');
        }
      }, 2000);
    }
  });
}

function updateLikeButton(recipe, category) {
  const likeBtn = document.getElementById('likeBtn');
  const isLiked = likedRecipes.some(r => r.title === recipe.title && r.category === category);
  likeBtn.innerHTML = isLiked ? '<span>💖</span> В избранном ✓' : '<span>❤️</span> В избранное';
  likeBtn.style.background = isLiked ? '#f0dbdb' : '#ffe8e8';
}

function selectCategory(category) {
  currentCategory = category;
  
  let recipes = [...(allRecipes[category] || [])];
  
  if (!recipes.length) {
    document.getElementById('warning').textContent = 'Нет рецептов в этой категории';
    document.getElementById('warning').style.display = 'block';
    return;
  }
  
  document.getElementById('warning').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  
  const randomIndex = Math.floor(Math.random() * recipes.length);
  currentRecipe = recipes[randomIndex];
  displayRecipe(currentRecipe, currentCategory);
}

function refreshRecipe() {
  if (currentCategory) {
    selectCategory(currentCategory);
  }
}

function toggleLike() {
  if (!currentRecipe || !currentCategory) return;
  
  const index = likedRecipes.findIndex(r => r.title === currentRecipe.title && r.category === currentCategory);
  if (index >= 0) {
    likedRecipes.splice(index, 1);
  } else {
    likedRecipes.push({
      title: currentRecipe.title,
      category: currentCategory,
      categoryName: categoryNames[currentCategory],
      time: currentRecipe.time,
      calories: currentRecipe.calories,
      ingredients: currentRecipe.ingredients,
      steps: currentRecipe.steps,
      note: currentRecipe.note,
      photo: currentRecipe.photo,
      likedAt: new Date().toISOString()
    });
    
    const toast = document.createElement('div');
    toast.textContent = '💖 Рецепт добавлен в избранное';
    toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1f2937; color:white; padding:12px 24px; border-radius:60px; z-index:1000; font-size:14px;';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  
  localStorage.setItem('likedRecipes', JSON.stringify(likedRecipes));
  updateLikeButton(currentRecipe, currentCategory);
}

function showCategoryModal() {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:2000;';
  modal.innerHTML = `
    <div style="background:white; border-radius:32px; max-width:340px; width:90%; padding:24px;">
      <h3 style="margin-bottom:16px;">🍽️ Категория</h3>
      <button class="modal-choice" data-cat="breakfast" style="display:block; width:100%; background:#fef9f0; border:1px solid #ffe1b9; padding:12px; border-radius:20px; margin:8px 0; text-align:left; cursor:pointer;">🌅 Завтрак</button>
      <button class="modal-choice" data-cat="lunch" style="display:block; width:100%; background:#fef9f0; border:1px solid #ffe1b9; padding:12px; border-radius:20px; margin:8px 0; text-align:left; cursor:pointer;">☀️ Обед</button>
      <button class="modal-choice" data-cat="dinner" style="display:block; width:100%; background:#fef9f0; border:1px solid #ffe1b9; padding:12px; border-radius:20px; margin:8px 0; text-align:left; cursor:pointer;">🌙 Ужин</button>
      <button class="modal-choice" data-cat="soups" style="display:block; width:100%; background:#fef9f0; border:1px solid #ffe1b9; padding:12px; border-radius:20px; margin:8px 0; text-align:left; cursor:pointer;">🍲 Супы</button>
      <button class="modal-choice" data-cat="dessert" style="display:block; width:100%; background:#fef9f0; border:1px solid #ffe1b9; padding:12px; border-radius:20px; margin:8px 0; text-align:left; cursor:pointer;">🍰 Десерт</button>
      <button class="modal-close" style="margin-top:12px; background:none; border:none; font-size:12px; width:100%; text-align:center; color:#aaa; cursor:pointer;">Закрыть</button>
    </div>
  `;
  
  document.body.appendChild(modal);
  
  modal.querySelectorAll('.modal-choice').forEach(btn => {
    btn.onclick = () => {
      selectCategory(btn.dataset.cat);
      modal.remove();
    };
  });
  modal.querySelector('.modal-close').onclick = () => modal.remove();
}

document.addEventListener('DOMContentLoaded', async () => {
  const loaded = await loadRecipesFromFile();
  if (!loaded) return;
  
  document.getElementById('randomBtn').onclick = showCategoryModal;
  document.getElementById('anotherRecipeBtn').onclick = refreshRecipe;
  document.getElementById('likeBtn').onclick = toggleLike;
});
</script>
</body>
</html>
