<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Генератор рецептов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 🔥 PocketBase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.1/dist/pocketbase.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: #222;
      padding: 16px 12px 100px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,.98);
      border-radius: 20px;
      padding: 16px 14px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 24px;
      font-weight: 600;
      transition: all .2s;
    }
    .main-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg,#f6d365,#fda085);
      font-size: 14px;
      color: #222;
      width: 100%;
      margin: 0 0 10px;
    }
    .main-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .premium-btn {

    .premium-btn.disabled {
      background: #e8e8e8;

    }
    .refresh {
      display: none;
      margin: 8px 0;
      padding: 11px 20px;
      background: linear-gradient(135deg,#ff6a00,#ee0979);
      color: #fff;
      font-size: 14px;

    }
    .allergens-btn {
      display: none;
      margin: 8px auto;
      padding: 10px 18px;

      color: #856404;

    }
    .allergens-btn.visible { display: inline-flex; align-items: center; gap: 6px; }

    .servings-label {

    .servings-btn {

      height: 40px;

    /* КНОПКА ЛАЙКА */
    .like-btn {
      display: none;
      margin: 12px auto;
      padding: 10px 24px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);

    }
    .like-btn.visible { display: inline-flex; align-items: center; gap: 8px; }
    .like-btn.liked {
      background: linear-gradient(135deg, #ee5a5a, #ff6b6b);

    .section-title { text-align: left; font-size: 14px; font-weight: 600; color: #333; margin: 14px 0 6px; }
    .plain-list { text-align: left; font-size: 13px; line-height: 1.6; color: #444; margin: 0 0 14px; padding-left: 24px; }

    .loader { display: none; padding: 16px; color: #666; font-size: 14px; }
    .error, .warning, .message { padding: 8px 12px; border-radius: 8px; margin: 8px 0; font-size: 13px; display: none; }

      text-align: center;

    .cabinet-btn,
    .profile-btn,

    }

    }

    }
    .premium-modal-content p {

      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .premium-upgrade-btn {
      background: linear-gradient(135deg, #f6d365, #fda085);
      color: #222;
      padding: 14px 32px;
      border-radius: 24px;
      font-size: 15px;

      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

      transform: translateY(-2px);

    }
    /* 🔥 УВЕДОМЛЕНИЕ ОБ ИЗБРАННОМ */
    .favorites-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
      padding: 14px 24px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(255,107,107,0.4);
      z-index: 1100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;

    }
    .favorites-toast.show {
      opacity: 1;

      transform: translateX(-50%) translateY(0);
    }

    }

      font-size: 18px;
    }
  </style>
</head>
<body>
<div class="card">

<!-- 🔥 МОДАЛКА ПРЕМИУМА -->
<div class="modal" id="premiumModal">
  <div class="modal-box">
    <span class="close" id="premiumModalClose">×</span>
    <div class="premium-modal-content">
      <h3>👑 Премиум функция</h3>
      <p>Эта функция доступна только для пользователей с активной подпиской.<br><br>Оформи подписку и получи доступ ко всем функциям!</p>
      <button class="premium-upgrade-btn" onclick="window.location.href='cabinet.html'">Оформить подписку</button>

<script>
// 🔥 PocketBase инициализация
const PB_URL = 'https://gotofka.ru';
const pb = new PocketBase(PB_URL);

// 🔥 🔥 🔥 ЕДИНАЯ ФУНКЦИЯ ПРОВЕРКИ ДОСТУПА (как в cabinet.html) 🔥 🔥 🔥
function hasAccess(user) {
  if (!user) return false;
  const now = new Date();
  
  // Проверка платной подписки
  if (user.is_subscribed === true && user.subscription_end) {
    if (new Date(user.subscription_end) > now) {
      return true;
    }
  }
  
  // 🔥 Проверка пробного периода (3 дня) — БЕЗ is_trial_used!
  if (user.trial_start) {
    const trialEnd = new Date(user.trial_start);
    trialEnd.setDate(trialEnd.getDate() + 3);
    if (now <= trialEnd) {
      return true;
    }
  }
  
  return false;
}

// Глобальные переменные
let ingredientsDB = {};
let loadedRecipes = {};
let currentCategory = null;
let currentRecipe = null;
let selectedAllergens = JSON.parse(localStorage.getItem('selectedAllergens') || '[]');
let likedRecipes = JSON.parse(localStorage.getItem('likedRecipes') || '[]');
let currentServings = 2;
let baseServings = 2;
let hasSubscription = false;
let currentUser = null;
let authRestored = false;
let shownRecipes = {}; // 🔥 НОВОЕ: история показанных рецептов по категориям

const els = {
  mainBtn: document.getElementById('mainBtn'),
  refreshBtn: document.getElementById('refreshBtn'),
  likeBtn: document.getElementById('likeBtn'),
  allergensBtn: document.getElementById('allergensBtn'),
  allergensCount: document.getElementById('allergensCount'),
  modal: document.getElementById('modal'),
  premiumModal: document.getElementById('premiumModal'),
  closeBtn: document.getElementById('closeBtn'),
  premiumModalClose: document.getElementById('premiumModalClose'),
  allergensModal: document.getElementById('allergensModal'),
  allergensModalClose: document.getElementById('allergensModalClose'),
  allergensGrid: document.getElementById('allergensGrid'),
  allergensSaveBtn: document.getElementById('allergensSaveBtn'),
  allergensClearBtn: document.getElementById('allergensClearBtn'),
  loader: document.getElementById('loader'),
  error: document.getElementById('error'),
  warning: document.getElementById('warning'),
  message: document.getElementById('message'),
  category: document.getElementById('category'),
  title: document.getElementById('title'),
  photo: document.getElementById('photo'),
  ingredients: document.getElementById('ingredients'),
  steps: document.getElementById('steps'),
  time: document.getElementById('time'),
  calories: document.getElementById('calories'),
  note: document.getElementById('note'),
  servingsSection: document.getElementById('servingsSection'),
  servingsCount: document.getElementById('servingsCount'),
  servingsMinus: document.getElementById('servingsMinus'),
  servingsPlus: document.getElementById('servingsPlus'),
  servingsLockIcon: document.getElementById('servingsLockIcon'),
  favoritesToast: document.getElementById('favoritesToast'),
  cabinetBtn: document.getElementById('cabinetBtn')
};

const categoryNames = {
  breakfast: 'Завтрак',
  lunch: 'Обед',
  dinner: 'Ужин',
  soups: 'Супы',
  dessert: 'Десерт'
};

// 🔥 🔥 🔥 ВОССТАНОВЛЕНИЕ СЕССИИ 🔥 🔥 🔥
function restoreAuthSession() {
  if (authRestored) return true;
  if (pb.authStore.isValid && pb.authStore.model?.id) {
    console.log('✅ Сессия найдена в pb.authStore');
    authRestored = true;
    return true;
  }
  try {
    const saved = localStorage.getItem('pocketbase_auth');
    if (saved) {
      const auth = JSON.parse(saved);
      if (auth.token && auth.model?.id) {
        console.log('✅ Восстановление сессии из localStorage');
        pb.authStore.save(auth.token, auth.model);
        authRestored = true;
        return true;
      }
    }
  } catch (e) { console.warn('⚠️ Не удалось восстановить из localStorage:', e); }
  try {
    const saved = sessionStorage.getItem('pocketbase_auth');
    if (saved) {
      const auth = JSON.parse(saved);
      if (auth.token && auth.model?.id) {
        console.log('✅ Восстановление сессии из sessionStorage');
        pb.authStore.save(auth.token, auth.model);
        authRestored = true;
        return true;
      }
    }
  } catch (e) { console.warn('⚠️ Не удалось восстановить из sessionStorage:', e); }
  console.log('❌ Сессия не найдена');
  return false;
}

function saveAuthSession() {
  if (!pb.authStore.isValid || !pb.authStore.model?.id) return;
  const authData = { token: pb.authStore.token, model: pb.authStore.model };
  try {
    localStorage.setItem('pocketbase_auth', JSON.stringify(authData));
    sessionStorage.setItem('pocketbase_auth', JSON.stringify(authData));
  } catch (e) { console.warn('⚠️ Не удалось сохранить сессию:', e); }
}

// 🔥 🔥 🔥 ПРОВЕРКА ПОДПИСКИ — БЕЗОПАСНАЯ ВЕРСИЯ 🔥 🔥 🔥
async function checkSubscription() {
  try {
    if (!authRestored) restoreAuthSession();
    
    if (pb.authStore.isValid && pb.authStore.model?.id) {
      currentUser = pb.authStore.model;
      saveAuthSession();
      
      // Получаем свежие данные пользователя
      const user = await pb.collection('users').getOne(currentUser.id, {
        headers: { 'Cache-Control': 'no-cache' }
      });
      
      // 🔥 Используем единую функцию hasAccess()
      hasSubscription = hasAccess(user);
      
      // Сохраняем в localStorage для быстрого доступа
      localStorage.setItem('userData', JSON.stringify({
        is_subscribed: user.is_subscribed,
        trial_start: user.trial_start,
        subscription_end: user.subscription_end,
        has_premium: hasSubscription,
        userId: user.id,
        checkedAt: Date.now()
      }));
      
      console.log('✅ Подписка:', hasSubscription ? 'активна ✓' : 'не активна');
      console.log('👤 Пользователь:', user.email);
      console.log('🎁 Триал:', user.trial_start ? user.trial_start : 'нет');
      
    } else {
      // 🔒 Не авторизован — нет доступа к премиум
      hasSubscription = false;
      localStorage.removeItem('userData'); // очищаем кэш для безопасности
    }
  } catch (err) {
    console.error('❌ Ошибка проверки подписки:', err);
    // 🔒 При ошибке — нет доступа к премиум
    hasSubscription = false;
  }
  return hasSubscription;
}

function showPremiumModal() { 
  if (els.premiumModal) els.premiumModal.style.display = 'flex'; 
}

  if (!recipe || !recipe.title) return false;
  return likedRecipes.some(r => r.title === recipe.title && r.category === currentCategory);

function toggleLike() {

      title: currentRecipe.title,

      photo: currentRecipe.photo,
      time: currentRecipe.time,
      calories: currentRecipe.calories,

// 🔥 ПРОВЕРКА АЛЛЕРГЕНОВ РЕЦЕПТА
function getRecipeAllergens(recipe) {
  const set = new Set();
  recipe?.ingredients?.forEach(item => {
    let id = '';
    if (typeof item === 'string') {
      const cleaned = item.toLowerCase().replace(/[^а-яё0-9]/g, ' ').trim().split(' ')[0];
      id = cleaned || '';
    } else if (typeof item === 'object') {
      id = item.ingredientId || item.id || '';
    }
    if (id && ingredientsDB[id]?.allergens) {
      ingredientsDB[id].allergens.forEach(a => set.add(a));
    }
  });
  return [...set];
}

// 🔥 ОПРЕДЕЛЕНИЕ ЕДИНИЦЫ ИЗМЕРЕНИЯ
function getUnitForIngredient(name) {
  const lower = name.toLowerCase();
  if (lower.includes('яйцо') || lower.includes('лаваш') || lower.includes('булочка') ||
      lower.includes('батон') || lower.includes('лимон') || lower.includes('апельсин') ||
      lower.includes('яблоко') || lower.includes('банан') || lower.includes('помидор') ||
      lower.includes('огурец') || lower.includes('картофель') || lower.includes('лук') ||
      lower.includes('чеснок') || lower.includes('перец') || lower.includes('кабачок') ||
      lower.includes('баклажан') || lower.includes('тыква') || lower.includes('морковь')) {
    return 'шт';
  }
  return 'г';
}

function capitalizeFirst(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// 🔥 ФОРМАТИРОВАНИЕ ИНГРЕДИЕНТОВ
function formatIngredients(ings) {
  if (!ings?.length) return '';
  const items = ings.map(it => {
    if (typeof it === 'string') {
      const parts = it.trim().split(/\s+/);
      let qty = '', name = it.trim();
      if (parts.length > 1 && /^\d+$/.test(parts[0])) {
        qty = parts[0];
        name = parts.slice(1).join(' ');
      }
      const unit = getUnitForIngredient(name);
      return `${capitalizeFirst(name)} — ${qty} ${unit}`;
    }
    const id = it.ingredientId;
    const ing = ingredientsDB[id] || {};
    const name = ing.name || id || '—';
    const qty = it.quantity != null ? it.quantity : '';
    const unit = it.unit || getUnitForIngredient(name);
    return `${capitalizeFirst(name)} — ${qty} ${unit}`;
  });
  return `<div class="section-title">📝 Ингредиенты:</div><ul class="plain-list">${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
}

// 🔥 МАСШТАБИРОВАНИЕ ИНГРЕДИЕНТОВ
function scaleIngredients(ingredients, fromServings, toServings) {
  if (!ingredients || !ingredients.length) return [];
  const ratio = toServings / fromServings;
  return ingredients.map(it => {
    if (typeof it === 'string') {
      const parts = it.trim().split(/\s+/);
      if (parts.length > 1 && /^\d+$/.test(parts[0])) {
        const scaledQty = Math.round(parseInt(parts[0]) * ratio);
        return `${scaledQty} ${parts.slice(1).join(' ')}`;
      }
      return it;
    }
    const scaledQty = it.quantity != null ? Math.round(it.quantity * ratio) : '';
    return { ...it, quantity: scaledQty };
  });
}

// 🔥 ЗАГРУЗКА РЕЦЕПТОВ
async function loadCategory(cat) {
  if (loadedRecipes[cat]) return loadedRecipes[cat];
  if (els.loader) els.loader.style.display = 'block';
  try {
    const res = await fetch(`recipes/${cat}.json?_=${Date.now()}`, {
      headers: { 'Cache-Control': 'no-cache, no-store' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    loadedRecipes[cat] = data;
    return data;
  } catch (err) {
    console.error('❌ Ошибка загрузки категории', cat, err);
    if (els.error) {
      els.error.innerHTML = `Не удалось загрузить рецепты:<br><small>${err.message || err}</small>`;
      els.error.style.display = 'block';
    }
    return [];
  } finally {
    if (els.loader) els.loader.style.display = 'none';
  }
}

// 🔥 ВЫБОР КАТЕГОРИИ
async function selectCategory(cat) {
  currentCategory = cat;
  shownRecipes[cat] = []; // 🔥 Сбрасываем историю при смене категории
  if (els.modal) els.modal.style.display = 'none';
  if (els.allergensBtn) els.allergensBtn.classList.add('visible');
  
  const recipes = await loadCategory(cat);
  if (!recipes.length) return;
  
  let candidates = recipes;
  if (hasSubscription && selectedAllergens.length) {
    candidates = recipes.filter(r => {
      const alls = getRecipeAllergens(r);
      return !alls.some(a => selectedAllergens.includes(a));
    });
  }
  
  if (!candidates.length) {
    const allergenList = selectedAllergens.map(a => getAllergenName(a)).join(', ');
    if (els.warning) {
      els.warning.innerHTML = `
        <div style="text-align:center;padding:10px;">
          <div style="font-size:32px;margin-bottom:8px;">⚠️</div>
          <div style="font-weight:600;margin-bottom:8px;">Нет рецептов без выбранных аллергенов</div>
          <div style="font-size:12px;color:#666;line-height:1.5;">
            В категории "${categoryNames[cat]}" все рецепты содержат:<br>
            <strong>${allergenList}</strong>
          </div>
          <div style="margin-top:12px;">
            <button onclick="resetAllergensAndRetry()"
              style="padding:10px 24px;background:linear-gradient(135deg,#f6d365,#fda085);border:none;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;color:#222;margin:4px;">
              🔄 Сбросить аллергии
            </button>
            <button onclick="if(els.warning)els.warning.style.display='none'"
              style="padding:10px 24px;background:#f5f5f5;border:none;border-radius:20px;cursor:pointer;font-size:13px;margin:4px;">
              Закрыть
            </button>
          </div>
        </div>
      `;
      els.warning.style.display = 'block';
    }
    if (els.refreshBtn) {
      els.refreshBtn.style.display = 'block';
      els.refreshBtn.textContent = '🔄 Выбрать другую категорию';
    }
    updateUI(null);
    return;
  }
  
  if (els.warning) els.warning.style.display = 'none';
  currentRecipe = candidates[Math.floor(Math.random() * candidates.length)];
  
  // 🔥 Сохраняем индекс показанного рецепта
  const originalIndex = recipes.findIndex(r => r.title === currentRecipe.title && r.time === currentRecipe.time);
  if (originalIndex >= 0 && !shownRecipes[cat].includes(originalIndex)) {
    shownRecipes[cat].push(originalIndex);
  }
  
  updateUI(currentRecipe);
}

// 🔥 ОБНОВИТЬ РЕЦЕПТ (без повторов)
async function refreshRecipe() {
  if (!currentCategory) return;
  const recipes = await loadCategory(currentCategory);
  if (!recipes.length) return;
  
  // Инициализируем массив показанных для категории, если нет
  if (!shownRecipes[currentCategory]) {
    shownRecipes[currentCategory] = [];
  }
  
  // Фильтруем кандидаты: без аллергенов + ещё не показанные
  let candidates = recipes.filter((r, index) => {
    // Проверка аллергенов (если премиум)
    if (hasSubscription && selectedAllergens.length) {
      const alls = getRecipeAllergens(r);
      if (alls.some(a => selectedAllergens.includes(a))) return false;
    }
    // Проверка на повтор
    return !shownRecipes[currentCategory].includes(index);
  });
  
  // 🔁 Если все рецепты показаны — сбрасываем историю и показываем заново
  if (!candidates.length) {
    shownRecipes[currentCategory] = [];
    candidates = recipes.filter(r => {
      if (hasSubscription && selectedAllergens.length) {
        const alls = getRecipeAllergens(r);
        return !alls.some(a => selectedAllergens.includes(a));
      }
      return true;
    });
    if (!candidates.length) {
      // Всё ещё пусто из-за аллергенов — показываем предупреждение
      if (els.warning) {
        els.warning.innerHTML = `
          <div style="text-align:center;padding:10px;">
            <div style="font-size:32px;margin-bottom:8px;">⚠️</div>
            <div style="font-weight:600;margin-bottom:8px;">Нет рецептов без выбранных аллергенов</div>
            <button onclick="resetAllergensAndRetry()"
              style="padding:10px 24px;background:linear-gradient(135deg,#f6d365,#fda085);border:none;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;color:#222;margin-top:12px;">
              🔄 Сбросить аллергии
            </button>
          </div>
        `;
        els.warning.style.display = 'block';
      }
      return;
    }

  }
  
  if (els.warning) els.warning.style.display = 'none';
  
  // Выбираем случайный рецепт из оставшихся кандидатов
  const randomIndex = Math.floor(Math.random() * candidates.length);
  const selectedRecipe = candidates[randomIndex];
  
  // 🔥 Сохраняем оригинальный индекс рецепта в массиве recipes
  const originalIndex = recipes.findIndex(r => r.title === selectedRecipe.title && r.time === selectedRecipe.time);
  if (originalIndex >= 0 && !shownRecipes[currentCategory].includes(originalIndex)) {
    shownRecipes[currentCategory].push(originalIndex);
  }
  
  currentRecipe = selectedRecipe;
  updateUI(currentRecipe);
}

  // 🔥 🔥 🔥 ВАЖНО: Сначала восстанавливаем сессию
  restoreAuthSession();
  
  // 🔥 Обновляем кнопку кабинета сразу
  updateCabinetButton();
  
  // 🔥 Проверяем подписку (использует hasAccess с триалом)
  await checkSubscription();
  
  // Загружаем ингредиенты
  await loadIngredients();
  renderAllergens();
  initServingsSection();
  
  // Обработчики аллергий
  if (els.allergensSaveBtn) {
    els.allergensSaveBtn.onclick = () => {
      if (!hasSubscription) { showPremiumModal(); return; }
      selectedAllergens = [];
      if (els.allergensGrid) {
        els.allergensGrid.querySelectorAll('input:checked').forEach(cb => {
          selectedAllergens.push(cb.dataset.allergen);
        });
      }
      localStorage.setItem('selectedAllergens', JSON.stringify(selectedAllergens));
      updateAllergensCount();
      if (els.allergensModal) els.allergensModal.style.display = 'none';
      if (currentCategory) selectCategory(currentCategory);
    };
  }
  
  if (els.allergensClearBtn) {
    els.allergensClearBtn.onclick = () => {
      if (!hasSubscription) { showPremiumModal(); return; }
      selectedAllergens = [];
      localStorage.removeItem('selectedAllergens');
      if (els.allergensGrid) {
        els.allergensGrid.querySelectorAll('input').forEach(cb => {
          cb.checked = false;
          cb.closest('label')?.classList.remove('checked');
        });
      }
      updateAllergensCount();
      if (els.allergensModal) els.allergensModal.style.display = 'none';
      if (currentCategory) selectCategory(currentCategory);
    };
  }
  
  if (els.refreshBtn) els.refreshBtn.onclick = refreshRecipe;
  
  document.querySelectorAll('.choice').forEach(btn => {
    btn.onclick = () => selectCategory(btn.dataset.category);
  });
  
  if (els.allergensGrid) {
    document.querySelectorAll('#allergensGrid input').forEach(cb => {
      if (selectedAllergens.includes(cb.dataset.allergen)) {
        cb.checked = true;
        cb.closest('label')?.classList.add('checked');
      }
    });
  }
  
  // 🔥 Слушаем изменения авторизации
  pb.authStore.onChange(() => {
    console.log('🔄 authStore изменился, isValid:', pb.authStore.isValid);
    if (pb.authStore.isValid) {
      saveAuthSession();
      checkSubscription().then(() => {
        updateCabinetButton();
        if (currentCategory) selectCategory(currentCategory);
      });
    }
  });
  
  console.log('✅ Приложение готово!');
  console.log('💖 Лайкнутых рецептов:', likedRecipes.length);
  console.log('👑 Подписка:', hasSubscription ? 'активна ✓' : 'не активна');
  console.log('🔐 Авторизация:', pb.authStore.isValid ? 'есть' : 'нет');
  console.log('🔗 PocketBase URL:', PB_URL);
});
</script>
</body>
</html>
