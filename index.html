<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Генератор рецептов</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fdf8ed 0%, #fef3e2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .page-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 40px);
    }

    .recipe-card {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      overflow-x: hidden;
      max-height: calc(100vh - 40px);
    }

    .recipe-card::-webkit-scrollbar {
      width: 4px;
    }
    .recipe-card::-webkit-scrollbar-track {
      background: #f0e4d4;
      border-radius: 10px;
    }
    .recipe-card::-webkit-scrollbar-thumb {
      background: #f5b042;
      border-radius: 10px;
    }

    .header-row {
      display: flex;
      justify-content: flex-end;
      padding: 20px 24px 12px;
      background: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .profile-icon {
      background: #f0e4d4;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #b45f2b;
      cursor: pointer;
      border: 1px solid #ffdec2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .profile-icon:hover { background: #e8d8c4; }

    .nav-bar { 
      padding: 0 24px 12px;
      background: white;
      position: sticky;
      top: 68px;
      z-index: 10;
    }
    
    .random-btn {
      background: linear-gradient(105deg, #f5b042, #f59e0b);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 18px;
      padding: 14px 20px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 14px rgba(245, 158, 11, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .random-btn:active { transform: scale(0.97); }
    .random-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .menu-row {
      display: flex;
      gap: 12px;
      margin: 16px 0 12px;
    }

    .menu-link {
      flex: 1;
      background: #fffaf5;
      border: 1.5px solid #ffe3c6;
      border-radius: 50px;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: #c47a2b;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .menu-link:hover { background: #fff0e2; }

    .another-recipe {
      background: linear-gradient(115deg, #2c3e50, #1a2a38);
      border: none;
      border-radius: 56px;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 16px;
      color: white;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      margin: 8px 0 4px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
    }
    .another-recipe.visible { display: flex; }
    .another-recipe:active { transform: scale(0.97); }

    .recipe-container {
      display: none;
    }
    .recipe-container.visible {
      display: block;
    }

    .image-section {
      background: linear-gradient(145deg, #f9efdf, #fae9d4);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    
    .recipe-photo {
      width: 100%;
      height: auto;
      max-height: 260px;
      object-fit: cover;
      display: none;
    }
    
    .food-icon {
      font-size: 64px;
      filter: drop-shadow(2px 6px 12px rgba(0,0,0,0.1));
      padding: 24px;
      text-align: center;
    }
    
    .food-icon.hidden {
      display: none;
    }

    .content { 
      padding: 24px;
      padding-bottom: 32px;
    }

    .category-badge {
      display: inline-block;
      background: #fef1df;
      color: #e67e22;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 30px;
      margin-bottom: 12px;
    }

    .recipe-title {
      font-size: 28px;
      font-weight: 700;
      color: #3e2c1a;
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-badge {
      background: #fef3e8;
      border-radius: 60px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      font-size: 14px;
      color: #7b5a3b;
    }

    .section-title {
      font-weight: 700;
      font-size: 19px;
      margin: 28px 0 16px 0;
      color: #3e2c1c;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #f7b05e;
      padding-left: 14px;
    }

    .ingredients-grid {
      background: #fefcf8;
      border-radius: 24px;
      list-style: none;
      margin-bottom: 8px;
    }
    .ingredients-grid li {
      padding: 12px 16px;
      border-bottom: 1px solid #f0e6da;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }
    .ingredients-grid li:last-child {
      border-bottom: none;
    }
    .ingredient-name { 
      font-weight: 500;
      flex: 1;
      color: #2c2418;
      font-size: 15px;
    }
    .ingredient-amount {
      color: #b45f2b;
      font-weight: 600;
      background: #fff2e5;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 13px;
      text-align: right;
      flex-shrink: 0;
    }

    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .steps-list li {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: #fefbf7;
      padding: 16px 18px;
      border-radius: 24px;
      transition: all 0.25s;
      border: 1px solid #f5e6d8;
      cursor: pointer;
    }
    .steps-list li:hover {
      background: #fffaf2;
      border-color: #faddb4;
      transform: translateX(4px);
    }
    .steps-list li.step-expanded {
      background: linear-gradient(135deg, #fff6ea, #fffaf0);
      border: 2px solid #f5b042;
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(245, 176, 66, 0.25);
      margin: 4px 0;
    }
    .steps-list li.step-expanded .step-text {
      font-weight: 600;
      color: #e67e22;
    }
    .steps-list li.step-expanded .step-number {
      background: #e67e22;
      transform: scale(1.05);
    }
    .step-number {
      background: #f5b042;
      color: white;
      font-weight: 800;
      width: 32px;
      height: 32px;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .step-text { flex: 1; line-height: 1.45; font-size: 15px; color: #3a2e22; }
    .step-icon { font-size: 22px; opacity: 0.6; transition: all 0.2s; }
    .steps-list li.step-expanded .step-icon { opacity: 1; transform: scale(1.1); }

    .note {
      background: #fff7ef;
      border-radius: 24px;
      padding: 16px 20px;
      margin: 28px 0 16px;
      font-size: 14px;
      color: #b76828;
      border-left: 4px solid #f5b042;
      display: flex;
      gap: 12px;
    }

    .like-button {
      background: #ffe8e8;
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-weight: 700;
      font-size: 16px;
      color: #bf3a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 20px;
    }
    .like-button:hover { background: #ffdddd; transform: scale(0.98); }
    hr { margin: 20px 0; border: 1px dashed #f0e0ce; }

    .loader, .error, .warning { 
      display: none; 
      margin: 16px 0; 
      text-align: center; 
      font-size: 14px;
      padding: 20px;
    }
    .error { color: #dc2626; }
    .warning { color: #d97706; }

    @media (max-width: 500px) {
      .content { padding: 20px; }
      .recipe-title { font-size: 24px; }
      .ingredient-amount { white-space: normal; }
      .steps-list li { padding: 12px 14px; }
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <div class="recipe-card">
    <div class="header-row">
      <a href="cabinet.html" class="profile-icon">👤 Кабинет</a>
    </div>

    <div class="nav-bar">
      <button class="random-btn" id="randomBtn">🎲 Случайный рецепт</button>
      <div class="menu-row">
        <a href="menu.html" class="menu-link">📅 Меню на неделю</a>
        <a href="ingredients.html" class="menu-link">🔍 По ингредиентам</a>
      </div>
      <button class="another-recipe" id="anotherRecipeBtn">🔄 Другой рецепт</button>
    </div>

    <div class="recipe-container" id="recipeContainer">
      <div class="image-section" id="imageSection">
        <div class="food-icon" id="defaultIcon">🍳✨</div>
        <img class="recipe-photo" id="recipePhoto" alt="Фото блюда">
      </div>

      <div class="content">
        <div class="category-badge" id="categoryBadge"></div>
        <h1 class="recipe-title" id="recipeTitle"></h1>

        <div class="stats-row">
          <div class="stat-badge" id="timeBadge">⏱️ —</div>
          <div class="stat-badge" id="caloriesBadge">🔥 —</div>
        </div>

        <div id="ingredientsContainer"></div>
        <div id="stepsContainer"></div>
        <div id="noteContainer"></div>

        <hr>
        <button class="like-button" id="likeBtn"><span>❤️</span> В избранное</button>
      </div>
    </div>
  </div>
</div>

<div class="loader" id="loader">📁 Загрузка рецептов из recipes.json...</div>
<div class="error" id="error"></div>
<div class="warning" id="warning"></div>

<script>
// ==================== ГЛОБАЛЬНЫЕ ДАННЫЕ ====================
let allRecipes = [];        // Массив всех рецептов из вашего JSON
let currentRecipe = null;
let likedRecipes = JSON.parse(localStorage.getItem('likedRecipes') || '[]');

// ==================== ЗАГРУЗКА ИЗ ВАШЕГО JSON ====================
async function loadRecipesFromFile() {
  const loader = document.getElementById('loader');
  const errorDiv = document.getElementById('error');
  const randomBtn = document.getElementById('randomBtn');
  
  if (loader) loader.style.display = 'block';
  if (randomBtn) randomBtn.disabled = true;
  
  try {
    const response = await fetch(`recipes.json?t=${Date.now()}`);
    
    if (!response.ok) {
      throw new Error(`Файл recipes.json не найден! (HTTP ${response.status})`);
    }
    
    const data = await response.json();
    
    // Проверяем, что данные - массив
    if (!Array.isArray(data)) {
      throw new Error('recipes.json должен содержать массив рецептов');
    }
    
    if (data.length === 0) {
      throw new Error('В recipes.json нет рецептов');
    }
    
    allRecipes = data;
    
    console.log('✅ Загружено рецептов:', allRecipes.length);
    console.log('Пример рецепта:', allRecipes[0]);
    
    if (loader) loader.style.display = 'none';
    if (randomBtn) randomBtn.disabled = false;
    return true;
    
  } catch (err) {
    console.error('Ошибка загрузки:', err);
    if (errorDiv) {
      errorDiv.innerHTML = `
        ❌ Ошибка: ${err.message}<br><br>
        <strong>Что делать:</strong><br>
        1. Убедитесь, что файл <strong>recipes.json</strong> существует<br>
        2. Файл должен лежать в <strong>той же папке</strong>, что и index.html<br>
        3. Структура: массив рецептов с полями:<br>
        &nbsp;&nbsp;- id, title, photo, servings, time, calories<br>
        &nbsp;&nbsp;- ingredients (массив объектов с ingredientId, quantity, unit)<br>
        &nbsp;&nbsp;- steps (массив строк)
      `;
      errorDiv.style.display = 'block';
    }
    if (loader) loader.style.display = 'none';
    if (randomBtn) randomBtn.disabled = true;
    return false;
  }
}

// ==================== ФОРМАТИРОВАНИЕ ====================
function getUnitText(unit) {
  const units = {
    'мл': 'мл',
    'г': 'г',
    'кг': 'кг',
    'шт': 'шт',
    'ст.л': 'ст.л',
    'ч.л': 'ч.л',
    'зуб': 'зуб.',
    'щепотка': 'щепотка'
  };
  return units[unit] || unit || '';
}

function formatIngredients(ingredients, servings = 2, originalServings = 2) {
  if (!ingredients?.length) return '';
  
  const ratio = servings / originalServings;
  
  const items = ingredients.map(ing => {
    const name = ing.ingredientId || 'Ингредиент';
    let quantity = ing.quantity || 0;
    
    // Масштабируем количество
    if (typeof quantity === 'number') {
      quantity = Math.round(quantity * ratio * 10) / 10;
    }
    
    const unit = getUnitText(ing.unit);
    
    const nameFormatted = name.charAt(0).toUpperCase() + name.slice(1);
    let amountText = '';
    
    if (quantity && unit) {
      amountText = `${quantity} ${unit}`;
    } else if (quantity) {
      amountText = quantity.toString();
    } else if (unit) {
      amountText = unit;
    } else {
      amountText = 'по вкусу';
    }
    
    return `<li><span class="ingredient-name">${nameFormatted}</span><span class="ingredient-amount">${amountText}</span></li>`;
  });
  
  return `<div class="section-title"><span>📋</span> Ингредиенты</div><ul class="ingredients-grid">${items.join('')}</ul>`;
}

function formatSteps(steps) {
  if (!steps?.length) return '';
  
  const stepIcons = ['🍯', '✨', '🥣', '🍪', '📄', '🔥', '🍵', '🧂', '🍽️', '⭐'];
  
  const items = steps.map((step, idx) => `
    <li data-step="${idx + 1}">
      <span class="step-number">${idx + 1}</span>
      <span class="step-text">${step}</span>
      <span class="step-icon">${stepIcons[idx % stepIcons.length]}</span>
    </li>
  `).join('');
  
  return `<div class="section-title"><span>👩‍🍳</span> Приготовление</div><ul class="steps-list" id="stepsList">${items}</ul>`;
}

// ==================== ОТОБРАЖЕНИЕ РЕЦЕПТА ====================
function displayRecipe(recipe) {
  if (!recipe) return;
  
  const container = document.getElementById('recipeContainer');
  container.classList.add('visible');
  
  const anotherBtn = document.getElementById('anotherRecipeBtn');
  anotherBtn.classList.add('visible');
  
  // Определяем категорию для отображения (если есть поле category, иначе "РЕЦЕПТ")
  const categoryText = recipe.category ? recipe.category.toUpperCase() : '🍽️ РЕЦЕПТ';
  document.getElementById('categoryBadge').textContent = categoryText;
  document.getElementById('recipeTitle').textContent = recipe.title;
  document.getElementById('timeBadge').innerHTML = recipe.time ? `⏱️ ${recipe.time}` : '⏱️ —';
  document.getElementById('caloriesBadge').innerHTML = recipe.calories ? `🔥 ${recipe.calories} ккал` : '🔥 —';
  
  // Фото
  const photoEl = document.getElementById('recipePhoto');
  const defaultIcon = document.getElementById('defaultIcon');
  
  if (recipe.photo && recipe.photo !== '') {
    photoEl.src = recipe.photo;
    photoEl.style.display = 'block';
    defaultIcon.classList.add('hidden');
  } else {
    photoEl.style.display = 'none';
    defaultIcon.classList.remove('hidden');
  }
  
  const servings = recipe.servings || 2;
  
  document.getElementById('ingredientsContainer').innerHTML = formatIngredients(recipe.ingredients, servings, servings);
  document.getElementById('stepsContainer').innerHTML = formatSteps(recipe.steps);
  
  if (recipe.note) {
    document.getElementById('noteContainer').innerHTML = `<div class="note"><span>✨</span> ${recipe.note}</div>`;
  } else {
    document.getElementById('noteContainer').innerHTML = '';
  }
  
  updateLikeButton(recipe);
  attachStepHandlers();
}

function attachStepHandlers() {
  const stepsList = document.getElementById('stepsList');
  if (!stepsList) return;
  
  const newStepsList = stepsList.cloneNode(true);
  stepsList.parentNode.replaceChild(newStepsList, stepsList);
  
  newStepsList.addEventListener('click', (event) => {
    const stepItem = event.target.closest('li');
    if (!stepItem) return;
    
    const isExpanded = stepItem.classList.contains('step-expanded');
    
    document.querySelectorAll('.steps-list li').forEach(li => {
      li.classList.remove('step-expanded');
    });
    
    if (!isExpanded) {
      stepItem.classList.add('step-expanded');
      setTimeout(() => {
        if (stepItem.classList.contains('step-expanded')) {
          stepItem.classList.remove('step-expanded');
        }
      }, 2000);
    }
  });
}

function updateLikeButton(recipe) {
  const likeBtn = document.getElementById('likeBtn');
  const isLiked = likedRecipes.some(r => r.id === recipe.id);
  likeBtn.innerHTML = isLiked ? '<span>💖</span> В избранном ✓' : '<span>❤️</span> В избранное';
  likeBtn.style.background = isLiked ? '#f0dbdb' : '#ffe8e8';
}

// ==================== ВЫБОР СЛУЧАЙНОГО РЕЦЕПТА ====================
function selectRandomRecipe() {
  if (!allRecipes.length) {
    document.getElementById('warning').textContent = 'Рецепты ещё не загружены';
    document.getElementById('warning').style.display = 'block';
    return;
  }
  
  document.getElementById('warning').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  
  const randomIndex = Math.floor(Math.random() * allRecipes.length);
  currentRecipe = allRecipes[randomIndex];
  displayRecipe(currentRecipe);
}

function refreshRecipe() {
  selectRandomRecipe();
}

function toggleLike() {
  if (!currentRecipe) return;
  
  const index = likedRecipes.findIndex(r => r.id === currentRecipe.id);
  if (index >= 0) {
    likedRecipes.splice(index, 1);
  } else {
    likedRecipes.push({
      id: currentRecipe.id,
      title: currentRecipe.title,
      time: currentRecipe.time,
      calories: currentRecipe.calories,
      ingredients: currentRecipe.ingredients,
      steps: currentRecipe.steps,
      note: currentRecipe.note,
      photo: currentRecipe.photo,
      likedAt: new Date().toISOString()
    });
    
    const toast = document.createElement('div');
    toast.textContent = '💖 Рецепт добавлен в избранное';
    toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1f2937; color:white; padding:12px 24px; border-radius:60px; z-index:1000; font-size:14px;';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  
  localStorage.setItem('likedRecipes', JSON.stringify(likedRecipes));
  updateLikeButton(currentRecipe);
}

// ==================== МОДАЛЬНОЕ ОКНО ====================
function showInfoModal() {
  if (!allRecipes.length) {
    alert('Рецепты ещё загружаются. Подождите немного...');
    return;
  }
  
  alert(`🍽️ Всего рецептов: ${allRecipes.length}\n\nНажмите "ОК" для случайного рецепта`);
  selectRandomRecipe();
}

// ==================== ЗАПУСК ====================
document.addEventListener('DOMContentLoaded', async () => {
  const loaded = await loadRecipesFromFile();
  
  if (loaded) {
    console.log(`✅ Загружено ${allRecipes.length} рецептов`);
  }
  
  document.getElementById('randomBtn').onclick = showInfoModal;
  document.getElementById('anotherRecipeBtn').onclick = refreshRecipe;
  document.getElementById('likeBtn').onclick = toggleLike;
});
</script>
</body>
</html>
