<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Генератор рецептов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(145deg, #FFF3E0, #FFE0B5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #2d2f36;
      padding: 20px 12px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.96);
      border-radius: 28px;
      padding: 20px 18px 28px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
    }
    .header-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 20px;
    }
    .profile-icon {
      background: #f0e4d4;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #b45f2b;
      cursor: pointer;
      border: 1px solid #ffdec2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .profile-icon:hover { background: #e8d8c4; }
    .primary-btn {
      background: linear-gradient(115deg, #f6b868, #f58d42);
      border: none;
      color: white;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 48px;
      width: 100%;
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .primary-btn:active { transform: scale(0.98); }
    .secondary-btn {
      background: white;
      border: 1.5px solid #ffcf9a;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 40px;
      width: 100%;
      margin-bottom: 10px;
      color: #b45f2b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .btn-group .secondary-btn { margin-bottom: 0; }
    .refresh-btn {
      background: #fef3e8;
      border: 1px solid #ffcf9a;
      color: #b45f2b;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      margin: 8px 0 12px;
      cursor: pointer;
      display: none;
    }
    .allergens-btn {
      background: #fff4e6;
      border: 1px solid #fed7aa;
      border-radius: 40px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 8px auto;
      cursor: pointer;
      color: #b45f2b;
    }
    .like-btn {
      background: #ffe4e6;
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      font-weight: 600;
      color: #b91c1c;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 12px auto;
      width: fit-content;
      cursor: pointer;
    }
    .servings-card {
      background: #FEF9F0;
      border-radius: 28px;
      padding: 12px 16px;
      margin: 12px 0;
      border: 1px solid #ffe1b9;
      display: none;
    }
    .servings-label {
      font-size: 13px;
      font-weight: 600;
      color: #c07a3a;
      text-align: center;
      margin-bottom: 8px;
    }
    .servings-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .servings-btn {
      width: 44px;
      height: 44px;
      border-radius: 40px;
      background: #ffe0bc;
      border: none;
      font-size: 22px;
      font-weight: 700;
      color: #e67e22;
      cursor: pointer;
    }
    .servings-count {
      font-size: 26px;
      font-weight: 800;
      color: #e67e22;
      min-width: 48px;
      text-align: center;
    }
    .section-title {
      font-weight: 700;
      margin: 18px 0 8px 0;
      font-size: 15px;
      color: #3e2c1c;
    }
    .plain-list {
      padding-left: 24px;
      font-size: 14px;
      line-height: 1.5;
      color: #5a4a38;
    }
    .plain-list li { margin: 8px 0; }
    .category-tag {
      display: none;
      background: #fde68a;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      color: #92400e;
      width: fit-content;
    }
    .category-tag.visible { display: inline-block; }
    .centered-title {
      text-align: center;
      font-size: 1.6rem;
      margin: 20px 0 16px;
      font-weight: 700;
      color: #c07a3a;
    }
    .recipe-title {
      font-size: 1.6rem;
      margin: 6px 0 4px;
      font-weight: 700;
      color: #c07a3a;
    }
    #photo {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 24px;
      background: #fef3e8;
      margin: 10px 0;
      display: none;
    }
    .fixed-bottom {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
    }
    .toast-fav {
      background: #1f2937;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
    }
    .modal, .allergens-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-box {
      background: white;
      border-radius: 32px;
      max-width: 340px;
      width: 90%;
      padding: 20px;
    }
    .choice {
      background: #fef9f0;
      border: 1px solid #ffe1b9;
      width: 100%;
      text-align: left;
      padding: 12px;
      border-radius: 20px;
      margin: 6px 0;
      font-weight: 500;
      cursor: pointer;
      color: #b45f2b;
    }
    .loader, .error, .warning { display: none; margin: 16px 0; text-align: center; font-size: 14px; }
    .error { color: #dc2626; }
    .warning { color: #d97706; }
    @media (max-width: 480px) {
      .card { padding: 16px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="header-row">
    <a href="cabinet.html" class="profile-icon" id="cabinetBtn">👤 Кабинет</a>
  </div>

  <button class="primary-btn" id="mainBtn">🎲 Случайный рецепт</button>
  
  <div class="btn-group">
    <a href="menu.html" class="secondary-btn" id="menuBtn">📅 Меню на неделю <span class="premium-badge-icon">👑</span></a>
    <a href="ingredients.html" class="secondary-btn" id="ingredientsBtn">🔍 По ингредиентам</a>
  </div>

  <button class="refresh-btn" id="refreshBtn">🔄 Другой рецепт</button>
  <button class="allergens-btn" id="allergensBtn">⚠️ Аллергии (<span id="allergensCount">0</span>)</button>

  <div class="servings-card" id="servingsSection">
    <div class="servings-label">👥 Количество персон</div>
    <div class="servings-controls">
      <button class="servings-btn" id="servingsMinus">−</button>
      <span class="servings-count" id="servingsCount">2</span>
      <button class="servings-btn" id="servingsPlus">+</button>
    </div>
  </div>

  <button class="like-btn" id="likeBtn"><span>❤️</span> <span>В избранное</span></button>

  <div class="loader" id="loader">Загрузка рецептов...</div>
  <div class="error" id="error"></div>
  <div class="warning" id="warning"></div>
  <div id="category" class="category-tag"></div>
  <div id="title" class="centered-title">🍳 Выберите категорию</div>
  <img id="photo" alt="Фото блюда">
  <div id="ingredients"></div>
  <div id="steps"></div>
  <div id="time" style="margin: 8px 0;"></div>
  <div id="calories" style="margin-bottom: 8px;"></div>
  <div id="note"></div>
</div>

<div class="fixed-bottom" id="favoritesToast" style="display: none;">
  <div class="toast-fav">💖 Рецепт добавлен в <strong style="cursor:pointer; text-decoration:underline;" onclick="window.location.href='cabinet.html'">Избранное</strong></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 style="margin-bottom: 14px;">🍽️ Категория</h3>
    <button class="choice" data-category="breakfast">🌅 Завтрак</button>
    <button class="choice" data-category="lunch">☀️ Обед</button>
    <button class="choice" data-category="dinner">🌙 Ужин</button>
    <button class="choice" data-category="soups">🍲 Супы</button>
    <button class="choice" data-category="dessert">🍰 Десерт</button>
    <button class="close-modal" style="margin-top:12px; background:none; border:none; font-size:12px; width:100%; text-align:center; color:#aaa; cursor:pointer;">Закрыть</button>
  </div>
</div>

<div class="allergens-modal" id="allergensModal">
  <div class="modal-box">
    <h3 style="margin-bottom: 16px;">🚫 Исключить аллергены</h3>
    <div id="allergensGrid" style="display: grid; gap: 8px; grid-template-columns: 1fr 1fr; margin-bottom: 20px;"></div>
    <div style="display: flex; gap: 12px;">
      <button id="allergensClearBtn" style="flex:1; background:#fef3e8; border:1px solid #ffcf9a; padding:10px; border-radius:40px; cursor:pointer;">Сбросить</button>
      <button id="allergensSaveBtn" style="flex:1; background:linear-gradient(115deg,#f6b868,#f58d42); color:white; border:none; border-radius:40px; cursor:pointer;">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ==================== ЗАГРУЗКА ИЗ JSON ФАЙЛА ====================

let allRecipes = {};
let currentCategory = null;
let currentRecipe = null;
let selectedAllergens = JSON.parse(localStorage.getItem('selectedAllergens') || '[]');
let likedRecipes = JSON.parse(localStorage.getItem('likedRecipes') || '[]');
let currentServings = 2;
let baseServings = 2;

const categoryNames = { 
  breakfast: 'Завтрак', 
  lunch: 'Обед', 
  dinner: 'Ужин', 
  soups: 'Супы', 
  dessert: 'Десерт' 
};

// Загрузка рецептов из recipes.json
async function loadRecipesFromFile() {
  const loader = document.getElementById('loader');
  const errorDiv = document.getElementById('error');
  
  if (loader) loader.style.display = 'block';
  if (errorDiv) errorDiv.style.display = 'none';
  
  try {
    const response = await fetch(`recipes.json?t=${Date.now()}`);
    
    if (!response.ok) {
      throw new Error(`Файл recipes.json не найден (HTTP ${response.status})`);
    }
    
    const data = await response.json();
    
    allRecipes = {
      breakfast: data.breakfast || [],
      lunch: data.lunch || [],
      dinner: data.dinner || [],
      soups: data.soups || [],
      dessert: data.dessert || []
    };
    
    const totalRecipes = Object.values(allRecipes).reduce((sum, arr) => sum + arr.length, 0);
    
    if (totalRecipes === 0) {
      throw new Error('В файле recipes.json нет рецептов');
    }
    
    console.log('✅ Загружено рецептов:', totalRecipes);
    
    if (loader) loader.style.display = 'none';
    return true;
    
  } catch (err) {
    console.error('Ошибка загрузки:', err);
    if (errorDiv) {
      errorDiv.innerHTML = `❌ Ошибка загрузки рецептов: ${err.message}<br><small>Убедитесь, что файл recipes.json находится в той же папке</small>`;
      errorDiv.style.display = 'block';
    }
    if (loader) loader.style.display = 'none';
    return false;
  }
}

function getRecipeAllergens(recipe) {
  const allergens = [];
  const ingredientsText = JSON.stringify(recipe.ingredients || []).toLowerCase();
  
  if (ingredientsText.includes('молок') || ingredientsText.includes('сливк') || ingredientsText.includes('сыр')) allergens.push('milk');
  if (ingredientsText.includes('яйц')) allergens.push('eggs');
  if (ingredientsText.includes('мук') || ingredientsText.includes('пшениц')) allergens.push('gluten');
  if (ingredientsText.includes('арахис')) allergens.push('peanuts');
  if (ingredientsText.includes('орех')) allergens.push('tree_nuts');
  if (ingredientsText.includes('рыб')) allergens.push('fish');
  
  return allergens;
}

function getUnitForIngredient(name) {
  const lower = name.toLowerCase();
  if (lower.includes('яйцо') || lower.includes('банан') || lower.includes('помидор') || 
      lower.includes('лук') || lower.includes('морков') || lower.includes('картош') ||
      lower.includes('кабачок')) return 'шт';
  if (lower.includes('зубчик')) return 'зуб.';
  if (lower.includes('щепотк')) return 'щепотка';
  return 'г';
}

function formatIngredients(ingredients) {
  if (!ingredients?.length) return '';
  
  const items = ingredients.map(it => {
    let name, quantity, unit;
    
    if (typeof it === 'string') {
      const match = it.match(/^(\d+(?:\.\d+)?)\s*(.+)$/);
      if (match) {
        quantity = match[1];
        const rest = match[2].trim();
        const unitMatch = rest.match(/^(г|мл|шт|зуб\.|щепотка)\s+(.+)$/);
        if (unitMatch) {
          unit = unitMatch[1];
          name = unitMatch[2];
        } else {
          name = rest;
          unit = getUnitForIngredient(name);
        }
      } else {
        name = it;
        quantity = '';
        unit = getUnitForIngredient(name);
      }
    } else {
      name = it.name || 'Ингредиент';
      quantity = it.quantity != null ? it.quantity : '';
      unit = it.unit || getUnitForIngredient(name);
    }
    
    const nameFormatted = name.charAt(0).toUpperCase() + name.slice(1);
    return `<li>${nameFormatted} — ${quantity} ${unit}</li>`;
  });
  
  return `<div class="section-title">📝 Ингредиенты</div><ul class="plain-list">${items.join('')}</ul>`;
}

function scaleIngredients(ingredients, fromServings, toServings) {
  const ratio = toServings / fromServings;
  return ingredients.map(it => {
    if (typeof it === 'object' && typeof it.quantity === 'number') {
      return { ...it, quantity: Math.round(it.quantity * ratio * 10) / 10 };
    }
    return it;
  });
}

function updateServingsDisplay() {
  if (!currentRecipe) return;
  const scaled = scaleIngredients(currentRecipe.ingredients, baseServings, currentServings);
  document.getElementById('ingredients').innerHTML = formatIngredients(scaled);
  document.getElementById('servingsCount').textContent = currentServings;
}

function updateUI(recipe) {
  if (!recipe) {
    document.getElementById('title').className = 'centered-title';
    document.getElementById('title').textContent = '🍳 Выберите категорию';
    document.getElementById('category').classList.remove('visible');
    document.getElementById('photo').style.display = 'none';
    document.getElementById('ingredients').innerHTML = '';
    document.getElementById('steps').innerHTML = '';
    document.getElementById('time').innerHTML = '';
    document.getElementById('calories').innerHTML = '';
    document.getElementById('note').innerHTML = '';
    document.getElementById('refreshBtn').style.display = 'none';
    document.getElementById('likeBtn').style.display = 'none';
    document.getElementById('servingsSection').style.display = 'none';
    return;
  }
  
  document.getElementById('category').textContent = (categoryNames[currentCategory] || currentCategory).toUpperCase();
  document.getElementById('category').classList.add('visible');
  document.getElementById('title').className = 'recipe-title';
  document.getElementById('title').textContent = recipe.title;
  
  if (recipe.photo) {
    const photoEl = document.getElementById('photo');
    photoEl.style.display = 'block';
    photoEl.src = recipe.photo;
    photoEl.onerror = () => { photoEl.style.display = 'none'; };
  } else {
    document.getElementById('photo').style.display = 'none';
  }
  
  baseServings = recipe.servings || 2;
  currentServings = baseServings;
  document.getElementById('servingsCount').textContent = currentServings;
  document.getElementById('servingsSection').style.display = 'block';
  document.getElementById('ingredients').innerHTML = formatIngredients(recipe.ingredients);
  
  if (recipe.steps?.length) {
    document.getElementById('steps').innerHTML = `<div class="section-title">👨‍🍳 Приготовление</div><ol class="plain-list">${recipe.steps.map(s => `<li>${s}</li>`).join('')}</ol>`;
  } else {
    document.getElementById('steps').innerHTML = '';
  }
  
  document.getElementById('time').innerHTML = recipe.time ? `⏱️ ${recipe.time}` : '';
  document.getElementById('calories').innerHTML = recipe.calories ? `🔥 ${recipe.calories} ккал` : '';
  document.getElementById('note').innerHTML = recipe.note ? `<em>💡 ${recipe.note}</em>` : '';
  document.getElementById('refreshBtn').style.display = 'block';
  document.getElementById('likeBtn').style.display = 'inline-flex';
  
  const isLiked = likedRecipes.some(r => r.title === recipe.title && r.category === currentCategory);
  const heartSpan = document.querySelector('#likeBtn span:first-child');
  const textSpan = document.querySelector('#likeBtn span:last-child');
  if (heartSpan) heartSpan.textContent = isLiked ? '💖' : '❤️';
  if (textSpan) textSpan.textContent = isLiked ? 'В избранном ✓' : 'В избранное';
}

function selectCategory(category) {
  currentCategory = category;
  document.getElementById('modal').style.display = 'none';
  
  let recipes = [...(allRecipes[category] || [])];
  
  if (selectedAllergens.length) {
    recipes = recipes.filter(r => {
      const alls = getRecipeAllergens(r);
      return !alls.some(a => selectedAllergens.includes(a));
    });
  }
  
  if (!recipes.length) {
    document.getElementById('warning').textContent = selectedAllergens.length ? 
      '⚠️ Нет рецептов без выбранных аллергенов' : '⚠️ Нет рецептов в этой категории';
    document.getElementById('warning').style.display = 'block';
    updateUI(null);
    return;
  }
  
  document.getElementById('warning').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  
  currentRecipe = recipes[Math.floor(Math.random() * recipes.length)];
  updateUI(currentRecipe);
}

function refreshRecipe() {
  if (!currentCategory) return;
  selectCategory(currentCategory);
}

function toggleLike() {
  if (!currentRecipe) return;
  
  const index = likedRecipes.findIndex(r => r.title === currentRecipe.title && r.category === currentCategory);
  if (index >= 0) {
    likedRecipes.splice(index, 1);
  } else {
    likedRecipes.push({
      title: currentRecipe.title,
      category: currentCategory,
      categoryName: categoryNames[currentCategory],
      time: currentRecipe.time,
      calories: currentRecipe.calories,
      servings: currentRecipe.servings,
      ingredients: currentRecipe.ingredients,
      steps: currentRecipe.steps,
      note: currentRecipe.note,
      photo: currentRecipe.photo,
      likedAt: new Date().toISOString()
    });
    
    const toast = document.getElementById('favoritesToast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }
  
  localStorage.setItem('likedRecipes', JSON.stringify(likedRecipes));
  updateUI(currentRecipe);
}

function renderAllergensModal() {
  const grid = document.getElementById('allergensGrid');
  const allergens = [
    { id: 'milk', label: '🥛 Молоко' },
    { id: 'eggs', label: '🥚 Яйца' },
    { id: 'gluten', label: '🌾 Глютен' },
    { id: 'peanuts', label: '🥜 Арахис' },
    { id: 'tree_nuts', label: '🌰 Орехи' },
    { id: 'fish', label: '🐟 Рыба' }
  ];
  
  grid.innerHTML = allergens.map(a => `
    <label style="display:flex; align-items:center; gap:8px; background:#fef9f0; padding:6px 12px; border-radius:40px; cursor:pointer;">
      <input type="checkbox" data-allergen="${a.id}" ${selectedAllergens.includes(a.id) ? 'checked' : ''}> ${a.label}
    </label>
  `).join('');
  
  document.getElementById('allergensCount').textContent = selectedAllergens.length;
  document.getElementById('allergensBtn').style.display = selectedAllergens.length ? 'inline-flex' : 'none';
}

// Инициализация
document.addEventListener('DOMContentLoaded', async () => {
  const loaded = await loadRecipesFromFile();
  if (!loaded) return;
  
  renderAllergensModal();
  
  document.getElementById('mainBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
  document.querySelector('.close-modal').onclick = () => document.getElementById('modal').style.display = 'none';
  document.getElementById('refreshBtn').onclick = refreshRecipe;
  document.getElementById('likeBtn').onclick = toggleLike;
  
  document.getElementById('allergensBtn').onclick = () => document.getElementById('allergensModal').style.display = 'flex';
  document.getElementById('allergensSaveBtn').onclick = () => {
    selectedAllergens = [];
    document.querySelectorAll('#allergensGrid input:checked').forEach(cb => {
      selectedAllergens.push(cb.dataset.allergen);
    });
    localStorage.setItem('selectedAllergens', JSON.stringify(selectedAllergens));
    document.getElementById('allergensModal').style.display = 'none';
    renderAllergensModal();
    if (currentCategory) selectCategory(currentCategory);
  };
  document.getElementById('allergensClearBtn').onclick = () => {
    selectedAllergens = [];
    localStorage.removeItem('selectedAllergens');
    document.querySelectorAll('#allergensGrid input').forEach(cb => cb.checked = false);
    document.getElementById('allergensModal').style.display = 'none';
    renderAllergensModal();
    if (currentCategory) selectCategory(currentCategory);
  };
  
  document.querySelectorAll('.choice').forEach(btn => {
    btn.onclick = () => selectCategory(btn.dataset.category);
  });
  
  document.getElementById('servingsMinus').onclick = () => {
    if (currentRecipe && currentServings > 1) {
      currentServings--;
      updateServingsDisplay();
    }
  };
  document.getElementById('servingsPlus').onclick = () => {
    if (currentRecipe && currentServings < 20) {
      currentServings++;
      updateServingsDisplay();
    }
